<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Jagriti ❤️🎀</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: white;
  text-align: center;
}

.card {
  background: rgba(0,0,0,0.35);
  padding: 25px;
  border-radius: 20px;
  max-width: 420px;
}

img {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 15px;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

.hidden-message {
  display: none;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="card">

<audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>

<img src="./your-image.jpg">

<h1>Happy Birthday Jagriti ❤️🎀</h1>

<p id="typedText"></p>

<button onclick="showMessage()">Last Message 💌</button>

<p class="hidden-message" id="secretMsg">
Na jaane kyu kuch log zindagi se door hoke bhi,
Dil ke sabse kareeb reh jaate hain…
Shayad tum unhi mein se ek ho.. ❤️

Have a beautiful day ✨
From your senior
</p>

</div>

<script>
  document.body.addEventListener("click", () => {
  document.getElementById("bgMusic").play();
}, { once: true });

// SIMPLE TEXT (no + no errors)
const text = `I hope tum theek ho aur life tumhe khush rakh rahi hai.

Sach bolu toh ek time tha jab tum mere liye bahut important thi.
aur shayad kahin na kahin woh feeling hamesha rahegi.

Jo bhi hua humare beech, uska thoda afsos toh hai.
Par saath hi main genuinely khush hu ki tumne apni khushi choose ki.

Bas itna kehna tha.
Tum mere liye special thi, ho, aur rahogi.

Happy Birthday to the most beautiful girl ❤️🎀
I don’t know where I stand in your heart,
but you’ll always have a place in mine.

From your Senior Aadi 🫶`;

let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("typedText").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 30);
  }
}

function showMessage() {
  document.getElementById("secretMsg").style.display = "block";
  document.getElementById("bgMusic").play();
}

typeWriter();

</script>

</body>
</html>
